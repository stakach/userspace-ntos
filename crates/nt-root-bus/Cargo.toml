[package]
name = "nt-root-bus"
description = "Synthetic root/PDO bus for the NT PnP Manager: creates physical device objects for fixture devnodes and answers the bus queries (IRP_MN_QUERY_ID device/hardware/compatible/instance IDs, IRP_MN_QUERY_CAPABILITIES). Wide-string + double-null multi-SZ encoding. no_std + alloc, no seL4 dependency, no raw pointers."
