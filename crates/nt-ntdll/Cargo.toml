[package]
name = "nt-ntdll"
description = "Our own Rust ntdll.dll (the userspace half of OUR kernel ABI). Step 2a: the swappable syscall-transport seam + a data-driven Nt* stub table keyed off the shared nt-syscall-abi SSN numbering. Step 2b: the bulk library surface — Category A pure Rtl* (strings/convert/integer/time/guid/path/status/random/bitmap), Category A' CRT re-exports (mem*/str*/wcs*/_snprintf/qsort/bsearch), Category B a REAL first-fit+coalescing heap over an abstract backing region, and Category C the RTL_CRITICAL_SECTION/SRWLOCK/RUN_ONCE layouts + uncontended fast paths with the contended-blocking path an honest keyed-event transport seam (not faked). The full 188-stub bodies / Csr/Dbg/Ki / loader are tracked follow-ons (Step 2c/Step 3). no_std + alloc; pure logic host-tested, target-only asm cfg-gated."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
# ntdll_plan Step 6.A — flip the Nt* stub transport from the x86 UnknownSyscall trap to a native
# seL4 `Call` on the service endpoint (CT_FAULT). OFF = the trap fallback (real ntdll / pi>=1).
native_transport = []

[dependencies]
nt-alpc-abi = { workspace = true }
nt-syscall-abi = { path = "../nt-syscall-abi" }
nt-ntdll-layout = { workspace = true }
nt-compat-exports = { workspace = true }
nt-kernel-exec = { workspace = true }
nt-security = { workspace = true }
nt-pe-loader = { workspace = true }
nt-port-core = { workspace = true }

[lints.clippy]
undocumented_unsafe_blocks = "deny"
