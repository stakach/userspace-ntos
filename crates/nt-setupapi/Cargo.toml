[package]
name = "nt-setupapi"
description = "User-mode device discovery: the CfgMgr32 (CM_Get_Device_Interface_List*) + SetupAPI (SetupDiGetClassDevs/EnumDeviceInterfaces/GetDeviceInterfaceDetailW) query surface a Win32 program uses to enumerate device interfaces + resolve their device paths, backed by the Configuration Manager. Includes the CONFIGRET/Win32 error model + an HDEVINFO handle table. no_std + alloc."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
nt-config-manager = { workspace = true }

[lints.clippy]
undocumented_unsafe_blocks = "deny"
