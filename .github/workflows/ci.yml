name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build root task (bare-metal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, rustfmt
      - name: rustfmt
        run: cd crates/ntos-root && cargo fmt --check
      - name: build ntos-root for the kernel's bare-metal target
        run: |
          cd crates/ntos-root
          cargo +nightly build \
            -Z build-std=core \
            -Z build-std-features=compiler-builtins-mem \
            -Z unstable-options \
            -Z json-target-spec \
            --target triplet.json \
            --release
